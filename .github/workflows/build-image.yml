name: Build NeuG image

on:
  workflow_run:
    workflows:
      - Format Check
    types:
      - completed

concurrency:
  group: ${{ github.repository }}-${{ github.event.workflow_run.id }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-neug-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.event == 'workflow_dispatch' || github.event.workflow_run.event == 'schedule' || github.event.workflow_run.event == 'pull_request' || (github.event.workflow_run.event == 'push' && startsWith(github.event.workflow_run.head_branch, 'v'))) }}
    runs-on: [ubuntu-22.04]

    steps:
    - name: checkout
      id: checkout
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.workflow_run.head_repository.full_name }}
        ref: ${{ github.event.workflow_run.head_sha }}
        submodules: false
    
    - name: Build NeuG Image
      run: |
        cd ${GITHUB_WORKSPACE}/
        cd docker && make neug-release
        ARCH=$(uname -m)
        docker image inspect graphscope/neug:${ARCH}

    - name: Remove Image
      run: |
        ARCH=$(uname -m)
        docker rmi graphscope/neug:${ARCH}