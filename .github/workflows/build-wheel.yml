name: Build Wheels

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'cmake/**'
      - 'src/**'
      - 'proto/**'
      - 'third_party/**'
      - 'tools/python_bind/**'
      - 'tests/**'
      - '.github/workflows/build-wheel.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'cmake/**'
      - 'src/**'
      - 'proto/**'
      - 'third_party/**'
      - 'tools/python_bind/**'
      - 'tests/**'
      - '.github/workflows/build-wheel.yml'

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build_wheels_linux_x86_64:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install cibuildwheel
        run: python3 -m pip install cibuildwheel==2.23.3

      - name: Prepare for linux
        run: |
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV

      - name: Build wheels
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          python3 -m cibuildwheel ./tools/python_bind --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        if: false
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ github.sha }}
          path: ./wheelhouse/*.whl

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@v1.4.2
        if: (github.ref == 'refs/heads/main' && github.repository == 'GraphScope/neug') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.repository == 'GraphScope/neug')
        with:
          user: __token__
          password: ${{ secrets.PYPI_PASSWORD }}
          packages_dir: wheelhouse/
          verbose: true
          skip_existing: true # Skip existing wheels to avoid errors if the same wheel is already published, to update the wheel for a specific version, add -{number} to the filename and
          # update it manually
    
      - name: Run simple test
        env:
          TMP_DIR: /tmp/${{ github.run_id }}
        run: |
          python3 -m pip install --upgrade pip
          for i in $(ls wheelhouse/*.whl); do
            python3 -m pip install $i || echo "Failed to install $i"
          done
          rm -rf ${TMP_DIR}/test_example
          GLOG_v=10 python3 tools/python_bind/example/simple_example.py example_dataset/modern_graph ${TMP_DIR}/test_example

  build_wheels_linux_arm64:
    runs-on: [self-hosted, linux, arm64]
    if: false
    steps:
      - name: checkout
        id: checkout
        uses: actions/checkout@v4

