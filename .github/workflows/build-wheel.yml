          rm -rf ${TMP_DIR}/test_example
          GLOG_v=10 python3 tools/python_bind/example/simple_example.py example_dataset/modern_graph ${TMP_DIR}/test_example

  build_wheels_macos_aarch64:
    runs-on: macos-14
    if: false
    steps:
      - name: checkout
        id: checkout
