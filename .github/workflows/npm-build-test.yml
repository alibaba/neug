name: NPM Test

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths: &npm_paths
      - 'cmake/**'
      - 'src/**'
      - 'include/**'
      - 'proto/**'
      - 'third_party/**'
      - 'tools/nodejs_bind/**'
      - '.github/workflows/npm-build-test.yml'
      - 'scripts/install_deps.sh'
      - 'CMakeLists.txt'
      - 'NEUG_VERSION'
  pull_request:
    branches:
      - main
    paths: *npm_paths

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  format_check:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/format-check.yml
    with:
      is_pull_request: ${{ github.event_name == 'pull_request' }}

  build_npm_linux_x86_64:
    needs: format_check
    runs-on: [self-hosted, daily, linux, x64]
    env:
      CONTAINER_NAME: neug-npm-x86_64-${{ github.run_id }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start container
        run: |
          docker run -d --name ${{ env.CONTAINER_NAME }} \
            -v ${{ github.workspace }}:/project \
            -w /project \
            neug-registry.cn-hongkong.cr.aliyuncs.com/neug/neug-manylinux:v0.1.2-x86_64 \
            sleep infinity

          docker exec ${{ env.CONTAINER_NAME }} bash -c '
            curl -fsSL https://nodejs.org/dist/v16.0.0/node-v16.0.0-linux-x64.tar.xz \
              | tar -xJ -C /usr/local --strip-components=1
            . /root/.neug_env
            git submodule update --init --recursive
          '

      - name: Build
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c '
            . /root/.neug_env
            cd /project/tools/nodejs_bind
            make build EXTRA_CMAKE_FLAGS="-DOPTIMIZE_FOR_HOST=OFF -DCMAKE_PREFIX_PATH=/opt/neug/ -DOPENSSL_ROOT_DIR=/opt/neug"
          '

      - name: Pack
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c '
            . /root/.neug_env
            cd /project/tools/nodejs_bind
            make pack EXTRA_CMAKE_FLAGS="-DOPTIMIZE_FOR_HOST=OFF -DCMAKE_PREFIX_PATH=/opt/neug/ -DOPENSSL_ROOT_DIR=/opt/neug"
          '

      - name: Test
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c '
            . /root/.neug_env
            cd /project/tools/nodejs_bind
            for f in tests/test_*.js; do echo "=== $f ===" && node "$f"; done
          '

      - name: Stop container
        if: always()
        run: |
          docker rm -f ${{ env.CONTAINER_NAME }} || true

      - name: Upload npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-linux-x86_64-${{ github.run_id }}
          path: ./tools/nodejs_bind/neug-*-linux_x86_64.tgz
          if-no-files-found: error

  build_npm_linux_arm64:
    needs: format_check
    runs-on: [self-hosted, daily, linux, arm64]
    if: github.event_name != 'pull_request'
    env:
      CONTAINER_NAME: neug-npm-arm64-${{ github.run_id }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start container
        run: |
          docker run -d --name ${{ env.CONTAINER_NAME }} \
            -v ${{ github.workspace }}:/project \
            -w /project \
            neug-registry.cn-hongkong.cr.aliyuncs.com/neug/neug-manylinux:v0.1.2-arm64 \
            sleep infinity

          docker exec ${{ env.CONTAINER_NAME }} bash -c '
            curl -fsSL https://nodejs.org/dist/v16.0.0/node-v16.0.0-linux-arm64.tar.xz \
              | tar -xJ -C /usr/local --strip-components=1
            . /root/.neug_env
            git submodule update --init --recursive
          '

      - name: Build
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c '
            . /root/.neug_env
            cd /project/tools/nodejs_bind
            make build EXTRA_CMAKE_FLAGS="-DOPTIMIZE_FOR_HOST=OFF -DCMAKE_PREFIX_PATH=/opt/neug/ -DOPENSSL_ROOT_DIR=/opt/neug"
          '

      - name: Pack
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c '
            . /root/.neug_env
            cd /project/tools/nodejs_bind
            make pack EXTRA_CMAKE_FLAGS="-DOPTIMIZE_FOR_HOST=OFF -DCMAKE_PREFIX_PATH=/opt/neug/ -DOPENSSL_ROOT_DIR=/opt/neug"
          '

      - name: Test
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c '
            . /root/.neug_env
            cd /project/tools/nodejs_bind
            for f in tests/test_*.js; do echo "=== $f ===" && node "$f"; done
          '

      - name: Stop container
        if: always()
        run: |
          docker rm -f ${{ env.CONTAINER_NAME }} || true

      - name: Upload npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-linux-arm64-${{ github.run_id }}
          path: ./tools/nodejs_bind/neug-*-linux_arm64.tgz
          if-no-files-found: error

  build_npm_macos_aarch64:
    needs: format_check
    runs-on: macos-15
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.0.0'

      - name: Install dependencies
        run: |
          bash scripts/install_deps.sh

      - name: Build
        run: |
          source ~/.neug_env
          cd tools/nodejs_bind
          make build EXTRA_CMAKE_FLAGS="-DOPTIMIZE_FOR_HOST=OFF"

      - name: Pack
        run: |
          source ~/.neug_env
          cd tools/nodejs_bind
          make pack EXTRA_CMAKE_FLAGS="-DOPTIMIZE_FOR_HOST=OFF"

      - name: Test
        run: |
          source ~/.neug_env
          cd tools/nodejs_bind
          for f in tests/test_*.js; do echo "=== $f ===" && node "$f"; done

      - name: Upload npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-macos-arm64-${{ github.run_id }}
          path: ./tools/nodejs_bind/neug-*-osx_arm64.tgz
          if-no-files-found: error
