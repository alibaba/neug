name: ldbc_small
version: v0.1
store_type: mutable_csr
description: A small LDBC-like graph for testing with person, comment, and post vertices

schema:
  vertex_types:
    # Person vertex type
    - type_id: 0
      type_name: person
      description: A person in the social network
      x_csr_params:
        max_vertex_num: 1000
      properties:
        - property_id: 0
          property_name: id
          property_type:
            primitive_type: DT_SIGNED_INT32
        - property_id: 1
          property_name: firstName
          property_type:
            string:
              long_text:
        - property_id: 2
          property_name: lastName
          property_type:
            string:
              long_text:
        - property_id: 3
          property_name: gender
          property_type:
            string:
              long_text:
        - property_id: 4
          property_name: birthday
          property_type:
            string:
              long_text:
        - property_id: 5
          property_name: creationDate
          property_type:
            string:
              long_text:
        - property_id: 6
          property_name: locationIP
          property_type:
            string:
              long_text:
        - property_id: 7
          property_name: browserUsed
          property_type:
            string:
              long_text:
        - property_id: 8
          property_name: language
          property_type:
            string:
              long_text:
        - property_id: 9
          property_name: email
          property_type:
            string:
              long_text:
      primary_keys:
        - id

    # Comment vertex type
    - type_id: 1
      type_name: comment
      description: A comment on posts or other comments
      x_csr_params:
        max_vertex_num: 1000
      properties:
        - property_id: 0
          property_name: id
          property_type:
            primitive_type: DT_SIGNED_INT32
        - property_id: 1
          property_name: creationDate
          property_type:
            string:
              long_text:
        - property_id: 2
          property_name: locationIP
          property_type:
            string:
              long_text:
        - property_id: 3
          property_name: browserUsed
          property_type:
            string:
              long_text:
        - property_id: 4
          property_name: content
          property_type:
            string:
              long_text:
        - property_id: 5
          property_name: length
          property_type:
            primitive_type: DT_SIGNED_INT32
      primary_keys:
        - id

    # Post vertex type
    - type_id: 2
      type_name: post
      description: A post in the forum
      x_csr_params:
        max_vertex_num: 1000
      properties:
        - property_id: 0
          property_name: id
          property_type:
            primitive_type: DT_SIGNED_INT32
        - property_id: 1
          property_name: imageFile
          property_type:
            string:
              long_text:
        - property_id: 2
          property_name: creationDate
          property_type:
            string:
              long_text:
        - property_id: 3
          property_name: locationIP
          property_type:
            string:
              long_text:
        - property_id: 4
          property_name: browserUsed
          property_type:
            string:
              long_text:
        - property_id: 5
          property_name: language
          property_type:
            string:
              long_text:
        - property_id: 6
          property_name: content
          property_type:
            string:
              long_text:
        - property_id: 7
          property_name: length
          property_type:
            primitive_type: DT_SIGNED_INT32
      primary_keys:
        - id

  edge_types:
    # person_knows_person
    - type_id: 0
      type_name: person_knows_person
      description: Person knows another person
      vertex_type_pair_relations:
        - source_vertex: person
          destination_vertex: person
          relation: MANY_TO_MANY
          x_csr_params:
            sort_on_compaction: TRUE
      properties:
        - property_id: 0
          property_name: creationDate
          property_type:
            string:
              long_text:

    # comment_hasCreator_person
    - type_id: 1
      type_name: comment_hasCreator_person
      description: Comment is created by a person
      vertex_type_pair_relations:
        - source_vertex: comment
          destination_vertex: person
          relation: MANY_TO_ONE

    # post_hasCreator_person
    - type_id: 2
      type_name: post_hasCreator_person
      description: Post is created by a person
      vertex_type_pair_relations:
        - source_vertex: post
          destination_vertex: person
          relation: MANY_TO_ONE
