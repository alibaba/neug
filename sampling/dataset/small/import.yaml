graph: ldbc_small
loading_config:
  data_source:
    scheme: file
  import_option: init
  format:
    type: csv
    metadata:
      delimiter: "|"
      header_row: true
      quoting: false
      quote_char: '"'
      double_quote: true
      escape_char: '\'
      escaping: false
      block_size: 4MB
      batch_reader: true
      null_values: ["", "None"]

vertex_mappings:
  # Person vertices
  - type_name: person
    inputs:
      - person.csv
    column_mappings:
      - column:
          index: 0
          name: id
        property: id
      - column:
          index: 1
          name: firstName
        property: firstName
      - column:
          index: 2
          name: lastName
        property: lastName
      - column:
          index: 3
          name: gender
        property: gender
      - column:
          index: 4
          name: birthday
        property: birthday
      - column:
          index: 5
          name: creationDate
        property: creationDate
      - column:
          index: 6
          name: locationIP
        property: locationIP
      - column:
          index: 7
          name: browserUsed
        property: browserUsed
      - column:
          index: 8
          name: language
        property: language
      - column:
          index: 9
          name: email
        property: email

  # Comment vertices
  - type_name: comment
    inputs:
      - comment.csv
    column_mappings:
      - column:
          index: 0
          name: id
        property: id
      - column:
          index: 1
          name: creationDate
        property: creationDate
      - column:
          index: 2
          name: locationIP
        property: locationIP
      - column:
          index: 3
          name: browserUsed
        property: browserUsed
      - column:
          index: 4
          name: content
        property: content
      - column:
          index: 5
          name: length
        property: length

  # Post vertices
  - type_name: post
    inputs:
      - post.csv
    column_mappings:
      - column:
          index: 0
          name: id
        property: id
      - column:
          index: 1
          name: imageFile
        property: imageFile
      - column:
          index: 2
          name: creationDate
        property: creationDate
      - column:
          index: 3
          name: locationIP
        property: locationIP
      - column:
          index: 4
          name: browserUsed
        property: browserUsed
      - column:
          index: 5
          name: language
        property: language
      - column:
          index: 6
          name: content
        property: content
      - column:
          index: 7
          name: length
        property: length

edge_mappings:
  # person_knows_person edges
  - type_triplet:
      edge: person_knows_person
      source_vertex: person
      destination_vertex: person
    inputs:
      - person_knows_person.csv
    source_vertex_mappings:
      - column:
          index: 0
          name: src_id
    destination_vertex_mappings:
      - column:
          index: 1
          name: dst_id
    column_mappings:
      - column:
          index: 2
          name: creationDate
        property: creationDate

  # comment_hasCreator_person edges
  - type_triplet:
      edge: comment_hasCreator_person
      source_vertex: comment
      destination_vertex: person
    inputs:
      - comment_hasCreator_person.csv
    source_vertex_mappings:
      - column:
          index: 0
          name: comment_id
    destination_vertex_mappings:
      - column:
          index: 1
          name: person_id

  # post_hasCreator_person edges
  - type_triplet:
      edge: post_hasCreator_person
      source_vertex: post
      destination_vertex: person
    inputs:
      - post_hasCreator_person.csv
    source_vertex_mappings:
      - column:
          index: 0
          name: post_id
    destination_vertex_mappings:
      - column:
          index: 1
          name: person_id
