graph: ldbc_snb
loading_config:
  data_source:
    scheme: file
    location: bi-sf100-composite-projected-fk/graphs/csv/bi/composite-projected-fk/initial_snapshot
  import_option: init # append, overwrite, only init is supported now
  format:
    type: csv
    metadata:
      delimiter: "|"  # other loading configuration places here
vertex_mappings:
  - type_name: PLACE
    inputs:
      - static/Place/merged.csv
  - type_name: PERSON 
    inputs:
      - dynamic/Person/merged_with_counts.csv
  - type_name: COMMENT
    inputs:
      - dynamic/Comment/merged.csv
  - type_name: POST
    inputs:
      - dynamic/Post/merged.csv
  - type_name: FORUM
    inputs:
      - dynamic/Forum/merged_with_counts.csv
  - type_name: ORGANISATION
    inputs:
      - static/Organisation/merged.csv
  - type_name: TAGCLASS
    inputs:
      - static/TagClass/merged.csv
  - type_name: TAG
    inputs:
      - static/Tag/merged.csv
edge_mappings:
  - type_triplet: 
      edge: HASCREATOR
      source_vertex: COMMENT
      destination_vertex: PERSON
    inputs:
      - dynamic/Comment_hasCreator_Person/merged.csv
    source_vertex_mappings:
      - column:
          index: 1
          name: id
    destination_vertex_mappings:
      - column:
          index: 2
          name: id
    column_mappings:
      - column:
          index: 0
          name: creationDate
        property: creationDate
  - type_triplet:
      edge: HASCREATOR
      source_vertex: POST
      destination_vertex: PERSON
    inputs:
